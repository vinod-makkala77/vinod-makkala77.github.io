<html>

      img {
        width: 200px;
        height: 200px; /* Makes the image circular */
        object-fit: cover; /* Ensures the image covers the entire area */
      }
    </style>
  </head>

    <img src="https://is.gd/VTwp2m" alt="Rectangular Image">
  </body>
